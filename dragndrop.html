<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CDN (for learning only) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <title>Drag & Drop</title>
</head>

<body class="min-h-screen flex justify-center items-center bg-gradient-to-br from-stone-200 to-white font-sans">

<div>

<header class="text-center mb-6">
    <h1 class="text-4xl font-bold">To do list</h1>
    <p class="text-gray-600">using eisenhower matrix</p>
    <footer class="opacity-50">@Jakebernal</footer>
</header>

<div class="flex gap-8 p-5">

<button
id="delete"
class="delete-btn h-12 p-2 rounded-md text-red-700 hover:bg-red-700 hover:text-white transition duration-300 active:scale-95">

<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 640 640"
class="w-6 h-6 fill-current">

<path d="M262.2 48C248.9 48 236.9 56.3 232.2 68.8L216 112L120 112C106.7 112 96 122.7 96 136C96 149.3 106.7 160 120 160L520 160C533.3 160 544 149.3 544 136C544 122.7 533.3 112 520 112L424 112L407.8 68.8C403.1 56.3 391.2 48 377.8 48L262.2 48zM128 208L128 512C128 547.3 156.7 576 192 576L448 576C483.3 576 512 547.3 512 512L512 208L464 208L464 512C464 520.8 456.8 528 448 528L192 528C183.2 528 176 520.8 176 512L176 208L128 208zM288 280C288 266.7 277.3 256 264 256C250.7 256 240 266.7 240 280L240 456C240 469.3 250.7 480 264 480C277.3 480 288 469.3 288 456L288 280zM400 280C400 266.7 389.3 256 376 256C362.7 256 352 266.7 352 280L352 456C352 469.3 362.7 480 376 480C389.3 480 400 469.3 400 456L400 280z"/>
</svg>

</button>

<div
id="leftBox"
class="grid grid-cols-2 grid-rows-2 gap-4 w-[500px] h-[500px]">

<div
 class="quadrant bg-white rounded-xl overflow-y-auto p-4 border border-gray-200 shadow-md hover:-translate-y-1 hover:shadow-lg transition duration-200"
 data-type="do">

<h4 class="font-semibold mb-3">Urgent & Important</h4>

</div>

<div
class="quadrant bg-white rounded-xl overflow-y-auto p-4 border border-gray-200 shadow-md hover:-translate-y-1 hover:shadow-lg transition duration-200"
data-type="schedule">

<h4 class="font-semibold mb-3">
 Not Urgent but Important
</h4>

</div>

<div
class="quadrant bg-white rounded-xl overflow-y-auto p-4 border border-gray-200 shadow-md hover:-translate-y-1 hover:shadow-lg transition duration-200"
data-type="delegate">

<h4 class="font-semibold mb-3">
 Urgent but Not Important
</h4>

</div>

<div
 class="quadrant bg-white rounded-xl overflow-y-auto p-4 border border-gray-200 shadow-md hover:-translate-y-1 hover:shadow-lg transition duration-200"
 data-type="eliminate">

<h4 class="font-semibold mb-3">
 Not Urgent & Not Important
</h4>

</div>

</div>

<div
 class="flex flex-col items-center p-5 rounded-xl overflow-y-auto">

<form
 id="txtform"
 class="flex flex-col items-center gap-3">

<input
 id="userInput"
 type="text"
 placeholder="Enter a task:"
 class="w-80 px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400">

<button
 id="enterBtn"
 type="submit"
 class="w-80 py-2 rounded-lg bg-gradient-to-br from-gray-800 to-black text-white hover:-translate-y-1 hover:shadow-lg active:scale-95 transition">

Enter

</button>

<div
id="list"
class="w-full mt-4 space-y-2">

</div>

</form>

</div>

</div>

</div>
  <script>
let userInput = document.getElementById("userInput");
let enterBtn = document.getElementById("enterBtn");
let lists = document.getElementById("list");
let boxes = document.querySelectorAll(".quadrant");
let leftBox = document.getElementById("leftBox");
let form = document.getElementById("txtform");
let deletebtn = document.getElementById("delete");

let draggeditem = null;

form.addEventListener('submit', function(e){
    e.preventDefault(); // I'd add this

    const output = userInput.value;

    let newtxt = document.createElement("p");

    newtxt.textContent = output;
    newtxt.draggable = true;

    newtxt.addEventListener("dragstart", () => {
        draggeditem = newtxt;
        newtxt.style.color = "red";
        newtxt.classList.add("dragging");
    });

    newtxt.addEventListener("dragend", () => {
        draggeditem = null;
        newtxt.style.color = "black";
        newtxt.classList.remove("dragging");
    });

    lists.appendChild(newtxt);
    form.reset();
});

boxes.forEach(box => {
    box.addEventListener("dragover", e => {
        e.preventDefault();
    });

    box.addEventListener("drop", () => {
        if (draggeditem) {
            box.appendChild(draggeditem);
        }
    });
});

deletebtn.addEventListener("dragover", e => {
    e.preventDefault();
});

deletebtn.addEventListener("drop", () => {
    if (draggeditem) {
        draggeditem.remove();
        draggeditem = null;
    }
});
</script>
</body>
</html>
